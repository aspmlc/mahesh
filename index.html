/* ── VARIABLES ── */
:root{
  --eg:#00FF87;    /* electric green */

/* ── KEYFRAMES ── */
@keyframes floatUp{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
@keyframes rotSlow{to{transform:rotate(360deg);}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(0,255,135,0.4);}70%{box-shadow:0 0 0 14px rgba(0,255,135,0);}}
@keyframes typewriter{from{width:0;}to{width:100%;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideRight{from{opacity:0;transform:translateX(-32px);}to{opacity:1;transform:translateX(0);}}
@keyframes particleDrift{0%{transform:translate(0,0) scale(1);opacity:0.7;}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}
@keyframes counterUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes waveArm{0%,100%{transform:rotate(-15deg);}50%{transform:rotate(30deg);}}
@keyframes mascotBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes bubblePop{0%{transform:scale(0);opacity:0;}80%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(0,255,135,0.5);}50%{text-shadow:0 0 40px rgba(0,255,135,0.9),0 0 80px rgba(0,255,135,0.3);}}
@keyframes scanLine{0%{top:-100%;}100%{top:200%;}}
@keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes jumpMascot{0%{transform:translateY(0);}40%{transform:translateY(-24px);}70%{transform:translateY(-14px);}100%{transform:translateY(0);}}

/* ── NAV ── */
.nav-item{color:rgba(240,247,238,0.7);text-decoration:none;font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.2s;padding:4px 0;position:relative;}
.nav-item::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:var(--eg);transition:width 0.25s;}
.nav-item:hover{color:var(--eg);}
.nav-item:hover::after{width:100%;}

/* ── GLASS CARD ── */
.glass{background:var(--glass);border:1px solid var(--glassBorder);border-radius:16px;backdrop-filter:blur(12px);}

/* ── REVEAL ── */
.rv{opacity:0;transform:translateY(28px);transition:opacity 0.75s ease,transform 0.75s ease;}
.rv.vis{opacity:1;transform:translateY(0);}
.rv2{opacity:0;transform:translateX(-28px);transition:opacity 0.75s ease,transform 0.75s ease;}
.rv2.vis{opacity:1;transform:translateX(0);}

/* ── HOVER EFFECTS ── */
.card-hover{transition:transform 0.28s,box-shadow 0.28s;}
.card-hover:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(0,255,135,0.12);}

/* ── CMS ── */
.cms-tab-btn{padding:10px 16px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.2s;white-space:nowrap;}

/* ── DIAGONAL DIVIDER ── */
.diag{clip-path:polygon(0 0,100% 0,100% 85%,0 100%);}
.diag-rev{clip-path:polygon(0 0,100% 6%,100% 100%,0 100%);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#050E05;}
::-webkit-scrollbar-thumb{background:var(--eg);border-radius:3px;}

/* ── TAG ── */

const L = (o,lang) => typeof o==='object'&&o!==null ? (o[lang]||o.en) : o;

/* ══════════════ PARTICLES ══════════════ */
function Particles() {
  const dots = useMemo(()=>Array.from({length:28},(_,i)=>({
    id:i, x:Math.random()*100, y:Math.random()*100,
    size:Math.random()*3+1.5,
    dur:Math.random()*6+4,
    dx:(Math.random()-0.5)*200+'px',
    dy:(Math.random()-0.5)*200+'px',
    delay:Math.random()*8,
    color:['#00FF87','#FFD700','#FF6B00','#FF4F6B','#00BFFF'][Math.floor(Math.random()*5)]
  })),[]);
  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:1}}>
      {dots.map(d=>(
        <div key={d.id} style={{
          position:'absolute',left:`${d.x}%`,top:`${d.y}%`,
          width:`${d.size}px`,height:`${d.size}px`,
          borderRadius:'50%',background:d.color,opacity:0.55,
          animation:`particleDrift ${d.dur}s ${d.delay}s ease-in-out infinite alternate`,
          '--dx':d.dx,'--dy':d.dy
        }}/>
      ))}
    </div>
  );
}

/* ══════════════ TYPEWRITER ══════════════ */
function Typewriter({ texts, lang }) {
  const [idx,setIdx] = useState(0);
  const [display,setDisplay] = useState('');
  const [charIdx,setCharIdx] = useState(0);
  const [deleting,setDeleting] = useState(false);
  const arr = L(texts,lang);

  useEffect(()=>{
    setDisplay(''); setCharIdx(0); setDeleting(false); setIdx(0);
  },[lang]);

  useEffect(()=>{
    const current = arr[idx]||'';
    if(!deleting && charIdx < current.length){
      const t=setTimeout(()=>{setDisplay(current.slice(0,charIdx+1));setCharIdx(c=>c+1);},60);
      return ()=>clearTimeout(t);
    } else if(!deleting && charIdx===current.length){
      const t=setTimeout(()=>setDeleting(true),2400);
      return ()=>clearTimeout(t);
    } else if(deleting && charIdx>0){
      const t=setTimeout(()=>{setDisplay(current.slice(0,charIdx-1));setCharIdx(c=>c-1);},30);
      return ()=>clearTimeout(t);
    } else if(deleting && charIdx===0){
      setDeleting(false); setIdx(i=>(i+1)%arr.length);
    }
  },[charIdx,deleting,idx,arr]);

  return (
    <span style={{color:'var(--eg)',fontFamily:"'Syne',sans-serif",fontWeight:800}}>
      {display}<span style={{animation:'blink 1s infinite',color:'var(--eg)'}}>|</span>
    </span>
  );
}

/* ══════════════ COUNTER ══════════════ */
function Counter({ num }) {
  const [val,setVal] = useState('0');
  const ref = useRef(null);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){
        setVal(num);
        obs.disconnect();
      }
    },{threshold:0.3});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[num]);
  return <span ref={ref} style={{animation:'counterUp 0.6s ease both'}}>{val}</span>;
}

/* ══════════════ REVEAL HOOK ══════════════ */
function useReveal(cls='rv'){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('vis');obs.unobserve(el);}},{threshold:0.08});
    obs.observe(el); return ()=>obs.disconnect();
  },[]);
  return ref;
}

              {lang==='mr'?'"माझ्याकडे येणारा प्रत्येक संदेश एक जबाबदारी आहे — मग ती रोजगाराची समस्या असो, पर्यावरणाची चिंता असो किंवा हरित धोरणाची कल्पना असो."':'"Every message I receive is a responsibility — whether it\'s a job problem, an eco concern, or a green policy idea."'}
            </p>
            <p style={{color:'var(--eg)',fontWeight:800,fontSize:'0.77rem',marginTop:'10px',fontFamily:"'Syne',sans-serif"}}>— Mahesh Vanjire</p>
          </div>
        </div>
        {/* Form */}
        <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(0,255,135,0.15)',borderRadius:'20px',padding:'36px'}}>
          <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:'1.2rem',fontWeight:800,color:'white',marginBottom:'24px'}}>
            {lang==='mr'?'तुमची समस्या किंवा कल्पना':'Share Your Issue or Idea'}
          </h3>
          {done?(
            <div style={{textAlign:'center',padding:'32px 0'}}>
              <div style={{fontSize:'3rem',marginBottom:'16px'}}>✅</div>
              <h4 style={{color:'var(--eg)',marginBottom:'8px',fontFamily:"'Syne',sans-serif",fontWeight:800}}>{lang==='mr'?'धन्यवाद!':'Thank You!'}</h4>
              <p style={{color:'rgba(240,247,238,0.55)',fontSize:'0.85rem',lineHeight:1.7}}>{lang==='mr'?'महेश वंजीरे तुमचा संदेश वैयक्तिकरित्या तपासतील.':'Mahesh Vanjire will review your message personally.'}</p>
              <button onClick={()=>{setDone(false);setForm({name:'',phone:'',area:'',topic:'Employment Issue',msg:''}); }} style={{marginTop:'20px',background:'var(--eg)',color:'#050E05',border:'none',borderRadius:'8px',padding:'10px 24px',cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontWeight:700}}>
                {lang==='mr'?'नवीन संदेश':'New Message'}
              </button>
            </div>
          ):(
            <div>
              {[{f:'name',l:{en:'Full Name',mr:'पूर्ण नाव'},p:{en:'Your name',mr:'तुमचे नाव'}},
                {f:'phone',l:{en:'Mobile',mr:'मोबाईल'},p:{en:'+91 XXXXX XXXXX',mr:'+91 XXXXX XXXXX'},t:'tel'},
                {f:'area',l:{en:'Area / Locality',mr:'क्षेत्र / परिसर'},p:{en:'Your area in Pune',mr:'पुण्यातील तुमचा परिसर'}}
              ].map(fi=>(
                <div key={fi.f} style={{marginBottom:'16px'}}>
                  <label style={{fontSize:'0.66rem',fontWeight:700,color:'rgba(240,247,238,0.45)',letterSpacing:'0.09em',textTransform:'uppercase',display:'block',marginBottom:'6px'}}>{L(fi.l,lang)}</label>
                  <input type={fi.t||'text'} placeholder={L(fi.p,lang)} value={form[fi.f]} onChange={e=>setForm(f=>({...f,[fi.f]:e.target.value}))}
                    style={{width:'100%',padding:'11px 14px',background:'rgba(255,255,255,0.05)',border:'1.5px solid rgba(255,255,255,0.1)',borderRadius:'8px',color:'white',fontSize:'0.9rem',fontFamily:'DM Sans,sans-serif',outline:'none',transition:'border-color 0.2s'}}
                    onFocus={e=>e.target.style.borderColor='var(--eg)'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.1)'}/>
                </div>
              ))}
              <div style={{marginBottom:'16px'}}>
                <label style={{fontSize:'0.66rem',fontWeight:700,color:'rgba(240,247,238,0.45)',letterSpacing:'0.09em',textTransform:'uppercase',display:'block',marginBottom:'6px'}}>{lang==='mr'?'विषय':'Topic'}</label>
                <select value={form.topic} onChange={e=>setForm(f=>({...f,topic:e.target.value}))}
                  style={{width:'100%',padding:'11px 14px',background:'rgba(255,255,255,0.05)',border:'1.5px solid rgba(255,255,255,0.1)',borderRadius:'8px',color:'white',fontSize:'0.9rem',fontFamily:'DM Sans,sans-serif',outline:'none'}}>
                  {topics.map(tp=><option key={tp.en} value={tp.en}>{lang==='mr'?tp.mr:tp.en}</option>)}
                </select>
              </div>
              <div style={{marginBottom:'20px'}}>
                <label style={{fontSize:'0.66rem',fontWeight:700,color:'rgba(240,247,238,0.45)',letterSpacing:'0.09em',textTransform:'uppercase',display:'block',marginBottom:'6px'}}>{lang==='mr'?'तुमचा संदेश':'Your Message'}</label>
                <textarea placeholder={lang==='mr'?'तुमची समस्या किंवा कल्पना सविस्तर सांगा...':'Describe your issue or idea in detail...'} value={form.msg} onChange={e=>setForm(f=>({...f,msg:e.target.value}))} rows={4}
                  style={{width:'100%',padding:'11px 14px',background:'rgba(255,255,255,0.05)',border:'1.5px solid rgba(255,255,255,0.1)',borderRadius:'8px',color:'white',fontSize:'0.9rem',fontFamily:'DM Sans,sans-serif',outline:'none',resize:'vertical'}}/>
              </div>
              <button onClick={submit} style={{width:'100%',background:'var(--eg)',color:'#050E05',border:'none',padding:'14px',borderRadius:'10px',fontWeight:800,fontSize:'0.9rem',cursor:'pointer',fontFamily:"'Syne',sans-serif",letterSpacing:'0.04em',boxShadow:'0 4px 20px rgba(0,255,135,0.25)'}}>
                {lang==='mr'?'संदेश पाठवा 📤':'Submit Message 📤'}
              </button>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

/* ══════════════ FOOTER ══════════════ */

  const links=[{h:'#about',en:'About',mr:'परिचय'},{h:'#pillars',en:'Vision',mr:'दृष्टिकोन'},{h:'#manifesto',en:'Manifesto',mr:'जाहीरनामा'},{h:'#experience',en:'Journey',mr:'प्रवास'},{h:'#join',en:'Join',mr:'सामील व्हा'},{h:'#contact',en:'Contact',mr:'संपर्क'}];
  return(
    <footer style={{background:'#030803',borderTop:'1px solid rgba(0,255,135,0.12)',textAlign:'center',padding:'44px 8%'}}>
      <div style={{fontFamily:"'Yatra One',cursive",fontSize:'1.5rem',color:'var(--gold)',marginBottom:'6px'}}>{content.hero.slogan}</div>
      <div style={{fontSize:'0.75rem',color:'rgba(240,247,238,0.3)',marginBottom:'28px',fontStyle:'italic'}}>{L(content.hero.sloganSub,lang)}</div>
      <div style={{display:'flex',gap:'22px',justifyContent:'center',flexWrap:'wrap',marginBottom:'24px'}}>
        {links.map(l=><a key={l.h} href={l.h} className="nav-item" style={{fontSize:'0.75rem'}}>{lang==='mr'?l.mr:l.en}</a>)}
      </div>
      <div style={{display:'flex',gap:'14px',justifyContent:'center',marginBottom:'24px',flexWrap:'wrap'}}>
        {[{icon:'🌿',l:'Eco Policy'},{icon:'👷',l:'Labour Rights'},{icon:'⚡',l:'Gen Z Lead'},{icon:'🇮🇳',l:'Maharashtra Pilot'}].map((t,i)=>(
          <span key={i} style={{background:'rgba(0,255,135,0.08)',border:'1px solid rgba(0,255,135,0.2)',color:'var(--eg)',padding:'5px 13px',borderRadius:'100px',fontSize:'0.68rem',fontWeight:700}}>{t.icon} {t.l}</span>
        ))}
      </div>
      <div style={{fontSize:'0.7rem',color:'rgba(240,247,238,0.2)'}}>
        Mahesh Vanjire – Graduate Constituency Pune MLC &nbsp;|&nbsp; {content.contact.email} &nbsp;|&nbsp; +91 {content.contact.phone}

    </footer>
  );
}

/* ══════════════ UTIL ══════════════ */
function hexToRgb(hex) {
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '0,255,135';
}

/* ══════════════ APP ══════════════ */
function App() {
  const [lang,setLang]=useState('en');
  const [showLogin,setShowLogin]=useState(false);
  const [showCMS,setShowCMS]=useState(false);
  const [photoSrc,setPhotoSrc]=useState(null);
  const [content,setContent]=useState(()=>{
    try{const s=localStorage.getItem('mv2_content');return s?JSON.parse(s):INIT;}catch{return INIT;}
  });
  useEffect(()=>{
    try{const p=localStorage.getItem('mv2_photo');if(p)setPhotoSrc(p);}catch{}
  },[]);

  const openCMS=()=>{ if(showCMS)setShowCMS(false); else setShowLogin(true); };

  return(
    <div>
      <Navbar lang={lang} setLang={setLang} onCMS={openCMS} content={content}/>
      <Hero lang={lang} content={content} photoSrc={photoSrc}/>
      <Tricolor/>
      <StatsBand lang={lang} content={content}/>
      <About lang={lang} content={content} photoSrc={photoSrc}/>
      <Pillars lang={lang} content={content}/>
      <Manifesto lang={lang} content={content}/>
      <Alignment lang={lang}/>
      <Experience lang={lang} content={content}/>
      <Roadmap lang={lang}/>
      <Join lang={lang}/>
      <Contact lang={lang} content={content}/>
      <Footer lang={lang} content={content}/>
      <Mascot lang={lang}/>

      {showLogin&&(
        <AdminLogin
          lang={lang}
          onSuccess={()=>{setShowLogin(false);setShowCMS(true);}}
          onClose={()=>setShowLogin(false)}
        />
      )}
      {showCMS&&(
        <>
          <div onClick={()=>setShowCMS(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2400}}/>
          <CMSPanel content={content} setContent={setContent} onClose={()=>setShowCMS(false)} lang={lang} photoSrc={photoSrc} setPhotoSrc={setPhotoSrc}/>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
